<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Chart: สรุปยอดขายไตรมาส 1/2569</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  body { font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif; }
</style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-2xl">

  <!-- Header -->
  <div class="text-center mb-6">
    <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">📊 สรุปยอดขายไตรมาส 1/2569</h1>
    <p class="text-slate-500 mt-1">เปรียบเทียบยอดขายรายเดือน (บาท) — hover เพื่อดูรายละเอียด</p>
  </div>

  <div class="bg-white rounded-2xl shadow-xl shadow-indigo-100 p-6 md:p-8">

    <!-- สรุปยอดรวม -->
    <div class="flex items-center justify-between mb-6 pb-6 border-b border-slate-100">
      <div>
        <p class="text-xs text-slate-400">ยอดขายรวมไตรมาส</p>
        <p class="text-2xl font-bold text-slate-800" id="total-sales">0 บาท</p>
      </div>
      <div class="text-right">
        <p class="text-xs text-slate-400">เดือนที่ขายดีที่สุด</p>
        <p class="text-lg font-bold text-emerald-500" id="best-month">-</p>
      </div>
    </div>

    <!-- กราฟ -->
    <div class="relative h-72">
      <canvas id="bar-chart"></canvas>
    </div>

  </div>
</div>

<script>
  // ===== ข้อมูล (แยกจาก UI logic) =====
  const salesData = [
    { month: "มกราคม", value: 150000 },
    { month: "กุมภาพันธ์", value: 180000 },
    { month: "มีนาคม", value: 220000 }
  ];

  // ===== คำนวณและแสดงสรุป =====
  function renderSummary() {
    const total = salesData.reduce((sum, d) => sum + d.value, 0);
    const best = salesData.reduce((max, d) => d.value > max.value ? d : max);
    document.getElementById('total-sales').textContent = total.toLocaleString('th-TH') + ' บาท';
    document.getElementById('best-month').textContent = best.month;
  }

  // ===== สร้างกราฟด้วย Chart.js =====
  function renderChart() {
    const ctx = document.getElementById('bar-chart').getContext('2d');
    const maxValue = Math.max(...salesData.map(d => d.value));

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: salesData.map(d => d.month),
        datasets: [{
          label: 'ยอดขาย (บาท)',
          data: salesData.map(d => d.value),
          backgroundColor: salesData.map(d =>
            d.value === maxValue ? '#6366f1' : '#c7d2fe'
          ),
          borderRadius: 8,
          maxBarThickness: 70
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            labels: { usePointStyle: true, pointStyle: 'rect', font: { family: 'Segoe UI' } },
            onClick: (e, legendItem, legend) => {
              // คลิก legend เพื่อซ่อน/แสดงชุดข้อมูลทั้งหมด
              const ci = legend.chart;
              const meta = ci.getDatasetMeta(0);
              meta.hidden = !meta.hidden;
              ci.update();
            }
          },
          tooltip: {
            backgroundColor: '#1e293b',
            padding: 12,
            callbacks: {
              label: (context) => `฿${context.parsed.y.toLocaleString('th-TH')}`
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: '#f1f5f9' },
            ticks: { callback: (val) => '฿' + (val / 1000) + 'k' }
          },
          x: {
            grid: { display: false }
          }
        },
        animation: { duration: 800, easing: 'easeOutQuart' }
      }
    });
  }

  renderSummary();
  renderChart();
</script>

</body>
</html>
