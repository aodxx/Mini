<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel: เครื่องมือ AI ยอดนิยม</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif; }
  #track { transition: transform 0.45s cubic-bezier(0.4, 0.2, 0.2, 1); }
  .dot { transition: all 0.3s ease; }
  .nav-arrow { transition: all 0.2s ease; }
  .nav-arrow:hover { transform: scale(1.1); }
</style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-xl">

  <!-- Header -->
  <div class="text-center mb-6">
    <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">🎠 เครื่องมือ AI ยอดนิยม</h1>
    <p class="text-slate-500 mt-1">เลื่อนดูเครื่องมือ AI แต่ละประเภท</p>
  </div>

  <!-- Carousel -->
  <div class="relative">
    <div class="overflow-hidden rounded-2xl shadow-xl shadow-indigo-100">
      <div id="track" class="flex">
        <!-- สไลด์ถูกสร้างด้วย JS -->
      </div>
    </div>

    <!-- ปุ่มเลื่อนซ้าย-ขวา -->
    <button onclick="prevSlide()" class="nav-arrow absolute left-3 top-1/2 -translate-y-1/2 bg-white/90 hover:bg-white shadow-lg w-10 h-10 rounded-full flex items-center justify-center text-indigo-600 font-bold">
      ‹
    </button>
    <button onclick="nextSlide()" class="nav-arrow absolute right-3 top-1/2 -translate-y-1/2 bg-white/90 hover:bg-white shadow-lg w-10 h-10 rounded-full flex items-center justify-center text-indigo-600 font-bold">
      ›
    </button>
  </div>

  <!-- Dots -->
  <div id="dots" class="flex justify-center gap-2 mt-5"></div>

</div>

<script>
  // ===== ข้อมูลสไลด์ (แยกจาก UI logic) =====
  const slides = [
    { icon: "💬", name: "Claude", category: "ผู้ช่วยสนทนา AI", gradient: "from-orange-400 to-rose-400", desc: "ผู้ช่วย AI จาก Anthropic เก่งด้านการเขียน วิเคราะห์ และเขียนโค้ด" },
    { icon: "🎨", name: "Midjourney", category: "สร้างภาพจากข้อความ", gradient: "from-violet-400 to-fuchsia-400", desc: "เครื่องมือสร้างภาพศิลปะจากคำบรรยายข้อความ ได้ผลลัพธ์ที่มีสไตล์เฉพาะตัว" },
    { icon: "🎬", name: "Runway", category: "สร้าง/แก้ไขวิดีโอ", gradient: "from-sky-400 to-indigo-400", desc: "แพลตฟอร์ม AI สำหรับสร้างและตัดต่อวิดีโอด้วยเทคโนโลยี Generative AI" },
    { icon: "🎵", name: "Suno", category: "สร้างเพลงด้วย AI", gradient: "from-emerald-400 to-teal-400", desc: "สร้างเพลงพร้อมเนื้อร้องและทำนองจากคำบรรยายสั้นๆ ได้ในไม่กี่นาที" },
    { icon: "💻", name: "GitHub Copilot", category: "ผู้ช่วยเขียนโค้ด", gradient: "from-slate-500 to-slate-700", desc: "ผู้ช่วย AI ที่แนะนำและเขียนโค้ดอัตโนมัติภายในโปรแกรมแก้ไขโค้ด" }
  ];

  let currentSlide = 0;

  function renderSlides() {
    const track = document.getElementById('track');
    track.innerHTML = slides.map(slide => `
      <div class="w-full shrink-0 px-1">
        <div class="bg-gradient-to-br ${slide.gradient} rounded-2xl p-8 h-64 flex flex-col items-center justify-center text-center text-white">
          <div class="text-6xl mb-4">${slide.icon}</div>
          <h2 class="text-2xl font-bold">${slide.name}</h2>
          <p class="text-white/80 text-sm mt-1 mb-3">${slide.category}</p>
          <p class="text-white/90 text-sm leading-relaxed max-w-sm">${slide.desc}</p>
        </div>
      </div>
    `).join('');
    updateTrackPosition();
  }

  function renderDots() {
    const dotsContainer = document.getElementById('dots');
    dotsContainer.innerHTML = slides.map((_, idx) => `
      <button onclick="goToSlide(${idx})" class="dot h-2 rounded-full ${idx === currentSlide ? 'w-6 bg-indigo-600' : 'w-2 bg-indigo-200'}"></button>
    `).join('');
  }

  function updateTrackPosition() {
    const track = document.getElementById('track');
    track.style.transform = `translateX(-${currentSlide * 100}%)`;
    renderDots();
  }

  function nextSlide() {
    currentSlide = (currentSlide + 1) % slides.length;
    updateTrackPosition();
  }

  function prevSlide() {
    currentSlide = (currentSlide - 1 + slides.length) % slides.length;
    updateTrackPosition();
  }

  function goToSlide(idx) {
    currentSlide = idx;
    updateTrackPosition();
  }

  // รองรับการปัดนิ้วบนมือถือ (swipe)
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  document.addEventListener('touchend', e => {
    const touchEndX = e.changedTouches[0].clientX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
      diff > 0 ? nextSlide() : prevSlide();
    }
  });

  // เริ่มต้นแสดงสไลด์แรก
  renderSlides();
</script>

</body>
</html>
