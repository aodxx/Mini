<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step Tutorial: เปิดเว็บด้วย GitHub Pages</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif; }
  .fade-in { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }
  .step-dot { transition: all 0.3s ease; }
</style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-xl">

  <!-- Header -->
  <div class="text-center mb-6">
    <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">🚀 เปิดเว็บด้วย GitHub Pages</h1>
    <p class="text-slate-500 mt-1">สอนทีละขั้นตอน ตั้งแต่สร้าง Repo จนได้เว็บไซต์จริง</p>
  </div>

  <div class="bg-white rounded-2xl shadow-xl shadow-indigo-100 p-6 md:p-8">

    <!-- Step indicators -->
    <div class="flex items-center justify-between mb-8" id="step-dots"></div>

    <!-- เนื้อหาแต่ละขั้นตอน -->
    <div id="step-content" class="fade-in min-h-[220px]">
      <!-- แทรกด้วย JS -->
    </div>

    <!-- ปุ่มควบคุม -->
    <div class="flex items-center justify-between mt-8 pt-6 border-t border-slate-100">
      <button id="prev-btn" onclick="prevStep()" class="px-5 py-2.5 rounded-xl font-medium text-slate-500 hover:bg-slate-50 transition disabled:opacity-30 disabled:cursor-not-allowed">
        ← ก่อนหน้า
      </button>
      <span id="step-label" class="text-sm text-slate-400"></span>
      <button id="next-btn" onclick="nextStep()" class="px-6 py-2.5 rounded-xl font-medium bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-200 transition">
        ถัดไป →
      </button>
    </div>

  </div>
</div>

<script>
  // ===== ข้อมูลขั้นตอน (แยกจาก UI logic) =====
  const steps = [
    {
      icon: "📁",
      title: "1. สร้าง Repository ใหม่",
      body: "ไปที่ GitHub.com แล้วกด “New Repository” ตั้งชื่อ เช่น <code>interactive-ui-library</code> เลือกเป็น Public และติ๊ก “Add a README file”",
      tip: "💡 ตั้งชื่อ repo ให้สื่อความหมาย เพราะจะกลายเป็นส่วนหนึ่งของ URL เว็บไซต์ในภายหลัง"
    },
    {
      icon: "📝",
      title: "2. อัปโหลดไฟล์ HTML",
      body: "กด “Add file” → “Create new file” ตั้งชื่อไฟล์ เช่น <code>index.html</code> แล้ววางโค้ด HTML ที่สร้างไว้ จากนั้นกด “Commit new file”",
      tip: "💡 ถ้ามีหลายไฟล์ ให้จัดเป็นโฟลเดอร์ตามหมวดหมู่ เพื่อให้ดูแลง่ายในระยะยาว"
    },
    {
      icon: "⚙️",
      title: "3. เปิดใช้งาน GitHub Pages",
      body: "ไปที่แท็บ “Settings” ของ repo → เมนูซ้ายเลือก “Pages” → ในหัวข้อ Source เลือก “Deploy from a branch” → Branch เลือก <code>main</code> และโฟลเดอร์ <code>/ (root)</code> แล้วกด Save",
      tip: "💡 ถ้าไฟล์หลักอยู่ในโฟลเดอร์ย่อย ให้เลือกโฟลเดอร์นั้นแทน root"
    },
    {
      icon: "⏳",
      title: "4. รอ Deploy",
      body: "GitHub จะใช้เวลาประมาณ 1-2 นาทีในการ build เว็บไซต์ สามารถเช็คสถานะได้ที่แท็บ “Actions” ของ repo",
      tip: "💡 ถ้าสถานะขึ้นสีเขียวติ๊กถูก แปลว่า deploy สำเร็จแล้ว"
    },
    {
      icon: "🌐",
      title: "5. เข้าดูเว็บไซต์จริง",
      body: "กลับไปที่หน้า Settings → Pages อีกครั้ง จะเห็นลิงก์เว็บไซต์ในรูปแบบ <code>https://username.github.io/repo-name</code> คลิกเข้าไปดูผลลัพธ์ได้เลย",
      tip: "🎉 เสร็จแล้ว! ตอนนี้ Interactive Component ของคุณกลายเป็นเว็บไซต์จริงที่แชร์ให้ใครก็ได้"
    }
  ];

  let currentStep = 0;

  function renderStepDots() {
    const container = document.getElementById('step-dots');
    container.innerHTML = '';
    steps.forEach((_, idx) => {
      const wrap = document.createElement('div');
      wrap.className = 'flex-1 flex items-center';

      const dot = document.createElement('div');
      dot.className = `step-dot w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold ${
        idx < currentStep ? 'bg-indigo-600 text-white' :
        idx === currentStep ? 'bg-indigo-600 text-white ring-4 ring-indigo-100' :
        'bg-slate-100 text-slate-400'
      }`;
      dot.textContent = idx < currentStep ? '✓' : idx + 1;
      wrap.appendChild(dot);

      if (idx < steps.length - 1) {
        const line = document.createElement('div');
        line.className = `flex-1 h-1 mx-1 rounded ${idx < currentStep ? 'bg-indigo-600' : 'bg-slate-100'}`;
        wrap.appendChild(line);
      }
      container.appendChild(wrap);
    });
  }

  function renderStep() {
    const step = steps[currentStep];
    const contentEl = document.getElementById('step-content');
    contentEl.classList.remove('fade-in');
    void contentEl.offsetWidth; // trigger reflow เพื่อให้ animation เล่นใหม่
    contentEl.classList.add('fade-in');

    contentEl.innerHTML = `
      <div class="text-5xl mb-4">${step.icon}</div>
      <h2 class="text-xl font-bold text-slate-800 mb-3">${step.title}</h2>
      <p class="text-slate-600 leading-relaxed mb-4">${step.body}</p>
      <div class="bg-indigo-50 border border-indigo-100 rounded-xl px-4 py-3 text-sm text-indigo-700">${step.tip}</div>
    `;

    document.getElementById('step-label').textContent = `ขั้นตอน ${currentStep + 1} / ${steps.length}`;
    document.getElementById('prev-btn').disabled = currentStep === 0;

    const nextBtn = document.getElementById('next-btn');
    if (currentStep === steps.length - 1) {
      nextBtn.textContent = '🎉 เสร็จสิ้น';
      nextBtn.onclick = resetTutorial;
    } else {
      nextBtn.textContent = 'ถัดไป →';
      nextBtn.onclick = nextStep;
    }

    renderStepDots();
  }

  function nextStep() {
    if (currentStep < steps.length - 1) {
      currentStep++;
      renderStep();
    }
  }

  function prevStep() {
    if (currentStep > 0) {
      currentStep--;
      renderStep();
    }
  }

  function resetTutorial() {
    currentStep = 0;
    renderStep();
  }

  // เริ่มต้นแสดงขั้นตอนแรก
  renderStep();
</script>

</body>
</html>
